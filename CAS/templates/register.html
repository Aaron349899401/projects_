{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<style>
.register-box {
    max-width: 420px;
    margin: 70px auto;
    background: white;
    padding: 28px;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.08);
}

.register-box h2 {
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 12px 14px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: 1px solid #ddd;
    font-size: 15px;
    box-sizing: border-box;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #2e7d62;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #25634f;
}
</style>

<div class="register-box">

    <h2>Create Account</h2>

    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button>Create Account</button>
    </form>

    <p>Already have an account? <a href="/login">Login</a></p>
</div>

{% endblock %}
