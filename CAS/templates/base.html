<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --green: #3a9e72;
            --green-dark: #2c7d59;
            --green-light: #e8f5ef;
            --text: #1a2e24;
            --muted: #6b7f74;
            --bg: #f4f7f5;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* ── NAVBAR ── */
        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(58,158,114,0.15);
            padding: 0 32px;
        }

        .nav-inner {
            max-width: 860px;
            margin: 0 auto;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-logo {
            width: 34px;
            height: 34px;
            background: var(--green);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .nav-logo svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        .nav-title {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--text);
            line-height: 1;
        }

        .nav-tagline {
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.02em;
            margin-top: 2px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            color: var(--muted);
            text-decoration: none;
            padding: 7px 14px;
            border-radius: 8px;
            transition: background 0.15s, color 0.15s;
        }

        .nav-links a:hover {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .nav-links a.active {
            background: var(--green-light);
            color: var(--green-dark);
        }

        .nav-links .btn-primary {
            background: var(--green);
            color: white;
            padding: 7px 16px;
            border-radius: 8px;
        }

        .nav-links .btn-primary:hover {
            background: var(--green-dark);
            color: white;
        }

        /* ── CONTENT ── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 16px;
            border-radius: 14px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.05);
        }

        input, textarea {
            width: 100%;
            padding: 10px 14px;
            margin: 8px 0;
            border: 1px solid #dde4e0;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
        }

        input:focus, textarea:focus {
            border-color: var(--green);
        }

        button {
            background: var(--green);
            color: white;
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s;
        }

        button:hover {
            background: var(--green-dark);
        }

        a { color: var(--green); }

        .center { text-align: center; }
    </style>
</head>
<body>

<header>
    <div class="nav-inner">
        <a class="nav-brand">
            <div class="nav-logo">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
                </svg>
            </div>
            <div>
                <div class="nav-title">Voices That Matter</div>
                <div class="nav-tagline">Wisdom from our Elders</div>
            </div>
        </a>

        <nav class="nav-links">
            {% if session.get('userID') %}
                <a href="/stories">Stories</a>
                <a href="/dashboard">Add Story</a>
                <a href="/logout" class="btn-primary">Log out</a>
            {% else %}
                <a href="/login">Log in</a>
                <a href="/register" class="btn-primary">Join</a>
            {% endif %}
        </nav>
    </div>
</header>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
